# Rename "app" below to whatever name `fly launch` assigns you (or pick one).
app = "code-motion-render-worker"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "performance-2x"
  memory = "4gb"
  cpus = 2

[deploy]
  strategy = "immediate"
